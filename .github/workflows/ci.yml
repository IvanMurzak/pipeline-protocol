name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"
      - name: Install
        run: bun install
      - name: Test
        run: bun test
      - name: Typecheck
        run: bunx tsc --noEmit
      - name: Build
        run: bun run build
